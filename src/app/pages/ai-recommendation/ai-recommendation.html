<div class="container mt-4">
  <h2 class="text-center mb-4">AI Cap Stylist</h2>

  <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
    <label class="form-label">Upload your photo</label>
    <input type="file" class="form-control mb-3" accept="image/*" (change)="onImageUpload($event)" />

    <div *ngIf="imagePreview" class="text-center mb-3">
      <img [src]="imagePreview" class="img-fluid rounded" style="max-height: 250px;" alt="Uploaded preview" />
    </div>

    <label class="form-label">Where are you going?</label>
    <select class="form-select mb-3" [(ngModel)]="occasion">
      <option value="">Select occasion</option>
      <option value="Beach">Beach</option>
      <option value="Dinner">Dinner</option>
      <option value="Vacation">Vacation</option>
      <option value="Picnic">Picnic</option>
      <option value="Sports">Sports</option>
      <option value="Casual">Casual</option>
    </select>

    <div *ngIf="loading" class="text-center mt-3">
      <div class="spinner-border text-success"></div>
    </div>

    <button class="btn btn-success w-100" (click)="getRecommendation()">
      Get AI Recommendation
    </button>
  </div>

  <div *ngIf="recommendation" class="card mt-4 shadow">
    <div class="card-body">
      <h5 class="text-success">Recommended Cap</h5>
      <p class="mt-3">{{ recommendation }}</p>
    </div>
  </div>

  <div *ngIf="matchedCaps.length > 0" class="mt-4">
    <h4 class="mb-3">Matching Caps From Catalog</h4>

    <div class="row">
      <div class="col-md-4 mb-3" *ngFor="let cap of matchedCaps">
        <div class="card shadow-sm h-100">
          <img [src]="cap.image" class="card-img-top" style="height: 220px; object-fit: cover;" alt="Cap" />

          <div class="card-body text-center">
            <h5>{{ cap.name }}</h5>
            <p class="text-muted">{{ cap.category }}</p>
            <h6 class="text-success">${{ cap.price }}</h6>
            <button class="btn btn-primary">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
