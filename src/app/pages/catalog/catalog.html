<div class="container mt-4">
  <h2 class="text-center mb-4">Cap Collection</h2>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let cap of caps">
      <div class="card shadow-sm">
        <img
          [src]="cap.image"
          class="card-img-top"
          style="height: 250px; object-fit: cover"
          alt="Cap"
        />

        <div class="card-body text-center">
          <h5 class="card-title">{{ cap.name }}</h5>
          <p class="text-muted">{{ cap.category }}</p>
          <h6 class="text-success">${{ cap.price }}</h6>

          <button class="btn btn-primary mt-2">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>
